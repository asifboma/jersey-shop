<!DOCTYPE html>
<html>
<head>
  <title>Jersey Order</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Order Your Jersey</h2>
  <p>Click below to open order form</p>

  <button onclick="openForm()">Place Order</button>
</div>

<script>
function openForm() {
  window.open(
    "https://docs.google.com/forms/d/e/1FAIpQLSdSUaG70SLwt7wqeXc1YjH1cjEbJpF4xZLc8NKKrE8XhxUR3Q/viewform",
    "_blank"
  );
}
</script>

</body>
</html>
