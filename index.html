<!DOCTYPE html>
<html>
<head>
  <title>Jersey Order</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }

    button:hover {
      background: #333;
    }

    .success {
      display: none;
      color: green;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Order Your Jersey</h2>

  <!-- IMPORTANT: Netlify form -->
  <form name="jersey-order" method="POST" data-netlify="true">

    <input type="hidden" name="form-name" value="jersey-order">

    <input name="name" placeholder="Full Name" required>
    <input name="phone" placeholder="Phone Number" required>
    <input name="address" placeholder="Address" required>
    <input name="jersey" placeholder="Jersey Name/Team" required>
    <input name="size" placeholder="Size (S/M/L/XL)" required>

    <button type="submit">Place Order</button>

  </form>

  <div class="success" id="msg">
    Order submitted successfully!
  </div>
</div>

</body>
</html>
