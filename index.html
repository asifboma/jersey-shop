<!DOCTYPE html>
<html>
<head>
  <title>Jersey Order</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Order Your Jersey</h2>

  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone Number">
  <input id="address" placeholder="Address">
  <input id="jersey" placeholder="Jersey Name/Team">
  <input id="size" placeholder="Size">

  <button onclick="submitOrder()">Place Order</button>
</div>

<script>
function submitOrder() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let jersey = document.getElementById("jersey").value;
  let size = document.getElementById("size").value;

  if(!name || !phone || !address || !jersey || !size){
    alert("Please fill all fields");
    return;
  }

  let url =
  "https://docs.google.com/forms/d/e/1vtWzTvP5tFi4aFwjTc41TctqmJLMVPuRkZMjsNFOzCQ/formResponse"
  + "?entry.1248912984=" + encodeURIComponent(name)
  + "&entry.1922890868=" + encodeURIComponent(phone)
  + "&entry.1598068495=" + encodeURIComponent(address)
  + "&entry.580166632=" + encodeURIComponent(jersey)
  + "&entry.653446067=" + encodeURIComponent(size);

  window.open(url, "_blank");
}
</script>

</body>
</html>
