<!DOCTYPE html>
<html>
<head>
  <title>Jersey Order</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Order Your Jersey</h2>

  <form action="https://docs.google.com/forms/d/e/1vtWzTvP5tFi4aFwjTc41TctqmJLMVPuRkZMjsNFOzCQ/formResponse" method="POST" target="_blank">

    <input name="entry.1248912984" placeholder="Full Name" required>
    <input name="entry.1922890868" placeholder="Phone Number" required>
    <input name="entry.1598068495" placeholder="Address" required>
    <input name="entry.580166632" placeholder="Jersey Name" required>
    <input name="entry.653446067" placeholder="Size" required>

    <button type="submit">Place Order</button>

  </form>
</div>

</body>
</html>
