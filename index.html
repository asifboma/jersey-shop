<!DOCTYPE html>
<html>
<head>
  <title>Jersey Order</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
    }

    input {
      border: 1px solid #ccc;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Order Jersey</h2>

  <form name="jersey-order" method="POST" data-netlify="true">

    <input type="hidden" name="form-name" value="jersey-order">

    <input name="name" placeholder="Full Name" required>
    <input name="phone" placeholder="Phone Number" required>
    <input name="address" placeholder="Address" required>
    <input name="jersey" placeholder="Jersey Name" required>
    <input name="size" placeholder="Size" required>

    <button type="submit">Place Order</button>
  </form>

</div>

</body>
</html>
